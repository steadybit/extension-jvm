{{- if include "jvm.openshift" . -}}
apiVersion: security.openshift.io/v1
kind: SecurityContextConstraints
metadata:
  name: {{ .Values.securityContextConstraint.name }}
priority: null
allowedCapabilities:
  {{- .Values.containerSecurityContext.capabilities.add | toYaml | nindent 2 }}
allowHostNetwork: true
allowHostPID: true
allowHostPorts: true
allowHostDirVolumePlugin: true
allowPrivilegeEscalation: true
runAsUser:
  type: MustRunAsNonRoot
seccompProfiles:
  - unconfined
seLinuxContext:
  # RunAsAny allows the pod to request an MCS-category-less SELinux level (s0), so that the
  # javaagent jars mounted into target containers are readable by the confined target JVMs.
  type: RunAsAny
{{- end -}}
