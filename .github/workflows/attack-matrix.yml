name: attack-support-matrix

# On-demand only (BM-13107). This suite is image- and time-heavy and is never part
# of ordinary push/PR builds. Trigger it manually from the Actions tab, or run the
# full grid against a PR by applying the "run-matrix" label.
on:
  workflow_dispatch:
    inputs:
      cells:
        description: 'Subset of cells to run (comma-separated substrings, e.g. "boot4.1.0,plainjava-java21"). Empty = full grid.'
        required: false
        default: ''
      isolation:
        description: 'Attack isolation mode'
        required: false
        default: 'per-attack'
        type: choice
        options:
          - per-attack
          - per-cell
  pull_request:
    types: [labeled]

jobs:
  matrix:
    name: Attack support matrix
    # workflow_dispatch always runs; on a PR only when the "run-matrix" label is applied.
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'run-matrix'
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21
          cache: maven

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build extension image
        env:
          MAVEN_ARGS: -s ${{ github.workspace }}/.github/workflows/maven-settings.xml
        run: make container

      - name: Run attack support matrix
        env:
          MATRIX_EXT_IMAGE: extension-jvm:latest
          MATRIX_CELLS: ${{ github.event.inputs.cells }}
          MATRIX_ISOLATION: ${{ github.event.inputs.isolation }}
        run: go test -tags matrix -timeout 3h -run TestSupportMatrix -v ./e2e/matrix/...

      - name: Upload matrix results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: attack-support-matrix
          path: |
            e2e/matrix/RESULTS.md
            e2e/matrix/results.json
          if-no-files-found: warn
          retention-days: 30

      - name: Job summary
        if: always()
        run: cat e2e/matrix/RESULTS.md >> "$GITHUB_STEP_SUMMARY" || echo "no RESULTS.md produced" >> "$GITHUB_STEP_SUMMARY"
